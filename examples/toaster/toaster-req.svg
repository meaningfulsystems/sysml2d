<path d="M 2 1 H 336 L 352 38 H 2 Z" fill="#FFFFFF" stroke="#333333" stroke-width="2"/>
<text class="header" x="12" y="24">[req.mb] Toaster Requirements [Toaster]</text>
<rect x="2" y="38" width="1849" height="828" fill="none" stroke="#333333" stroke-width="0"/>
<g transform="translate(2,40)">
<rect id="toastSafetyRequirement" x="820" y="72" width="209" height="88" rx="4" fill="#FFF7ED" stroke="#C2410C" stroke-width="2"/>
<text class="label" text-anchor="middle"><tspan x="924.5" y="93.5">«requirement»</tspan><tspan x="924.5" dy="15">REQ-T-001 Toast Safety</tspan><tspan x="924.5" dy="15">Prevent exposed energized</tspan><tspan x="924.5" dy="15">or overheating hazards.</tspan></text>
<rect id="electricalSafetyRequirement" x="374" y="270" width="223" height="88" rx="4" fill="#FFF7ED" stroke="#C2410C" stroke-width="2"/>
<text class="label" text-anchor="middle"><tspan x="485.5" y="291.5">«requirement»</tspan><tspan x="485.5" dy="15">REQ-T-002 Electrical Safety</tspan><tspan x="485.5" dy="15">Comply with UL 1026 / IEC</tspan><tspan x="485.5" dy="15">60335-2-9 safety intent.</tspan></text>
<rect id="browningRequirement" x="971" y="270" width="223" height="88" rx="4" fill="#FFF7ED" stroke="#C2410C" stroke-width="2"/>
<text class="label" text-anchor="middle"><tspan x="1082.5" y="291.5">«requirement»</tspan><tspan x="1082.5" dy="15">REQ-T-003 Browning Quality</tspan><tspan x="1082.5" dy="15">Deliver selectable browning</tspan><tspan x="1082.5" dy="15">without burning bread.</tspan></text>
<rect id="timingRequirement" x="1410" y="270" width="223" height="88" rx="4" fill="#FFF7ED" stroke="#C2410C" stroke-width="2"/>
<text class="label" text-anchor="middle"><tspan x="1521.5" y="291.5">«requirement»</tspan><tspan x="1521.5" dy="15">REQ-T-004 Toast Timing</tspan><tspan x="1521.5" dy="15">Release carriage when timer</tspan><tspan x="1521.5" dy="15">or cancel event occurs.</tspan></text>
<rect id="powerRatingRequirement" x="72" y="468" width="202" height="88" rx="4" fill="#FFF7ED" stroke="#C2410C" stroke-width="2"/>
<text class="label" text-anchor="middle"><tspan x="173" y="489.5">«requirement»</tspan><tspan x="173" dy="15">REQ-T-010 Power Rating</tspan><tspan x="173" dy="15">Operate at 900-1200 W on</tspan><tspan x="173" dy="15">120 VAC / 60 Hz supply.</tspan></text>
<rect id="surfaceTemperatureRequirement" x="346" y="468" width="237" height="88" rx="4" fill="#FFF7ED" stroke="#C2410C" stroke-width="2"/>
<text class="label" text-anchor="middle"><tspan x="464.5" y="489.5">«requirement»</tspan><tspan x="464.5" dy="15">REQ-T-011 Surface Temp</tspan><tspan x="464.5" dy="15">Touchable surfaces &lt;= 60 C</tspan><tspan x="464.5" dy="15">at max setting, 25 C ambient.</tspan></text>
<rect id="thermalCutoffRequirement" x="655" y="468" width="244" height="88" rx="4" fill="#FFF7ED" stroke="#C2410C" stroke-width="2"/>
<text class="label" text-anchor="middle"><tspan x="777" y="489.5">«requirement»</tspan><tspan x="777" dy="15">REQ-T-012 Thermal Cutoff</tspan><tspan x="777" dy="15">Open heater circuit before</tspan><tspan x="777" dy="15">external surface exceeds 90 C.</tspan></text>
<rect id="browningLevelsRequirement" x="974.5" y="468" width="216" height="88" rx="4" fill="#FFF7ED" stroke="#C2410C" stroke-width="2"/>
<text class="label" text-anchor="middle"><tspan x="1082.5" y="489.5">«requirement»</tspan><tspan x="1082.5" dy="15">REQ-T-020 Browning Levels</tspan><tspan x="1082.5" dy="15">Provide 7 browning levels;</tspan><tspan x="1082.5" dy="15">slot delta &lt;= 1.5 DeltaE.</tspan></text>
<rect id="carriageReleaseRequirement" x="1269.5" y="468" width="216" height="88" rx="4" fill="#FFF7ED" stroke="#C2410C" stroke-width="2"/>
<text class="label" text-anchor="middle"><tspan x="1377.5" y="489.5">«requirement»</tspan><tspan x="1377.5" dy="15">REQ-T-021 Carriage Release</tspan><tspan x="1377.5" dy="15">Pop up within 2 s of cycle</tspan><tspan x="1377.5" dy="15">completion or cancel.</tspan></text>
<rect id="crumbTrayForceRequirement" x="1266" y="666" width="223" height="88" rx="4" fill="#FFF7ED" stroke="#C2410C" stroke-width="2"/>
<text class="label" text-anchor="middle"><tspan x="1377.5" y="687.5">«requirement»</tspan><tspan x="1377.5" dy="15">REQ-T-030 Crumb Tray Force</tspan><tspan x="1377.5" dy="15">Remove tray with 5-15 N and</tspan><tspan x="1377.5" dy="15">capture &gt;= 90% crumbs.</tspan></text>
<rect id="cycleLifeRequirement" x="1561" y="468" width="216" height="88" rx="4" fill="#FFF7ED" stroke="#C2410C" stroke-width="2"/>
<text class="label" text-anchor="middle"><tspan x="1669" y="489.5">«requirement»</tspan><tspan x="1669" dy="15">REQ-T-040 Cycle Life</tspan><tspan x="1669" dy="15">Lever, latch, and carriage</tspan><tspan x="1669" dy="15">survive &gt;= 10,000 cycles.</tspan></text>
